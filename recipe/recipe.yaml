schema_version: 1

context:
  name: tea-tasting
  version: "2.0.0"
  python_min: "3.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/tea_tasting-${{ version }}.tar.gz
  sha256: ff43538d217b38ff0cc9b929f503839ce65458574d945adea4470590f727f706

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pdm-backend >=2.4,<3
    - pip
  run:
    - python >=${{ python_min }}
    - narwhals >=2.8
    - numpy >=2.1
    - pyarrow >=17
    - scipy >=1.15

tests:
  - python:
      imports:
        - tea_tasting
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Python package for statistical analysis of A/B tests.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/e10v/tea-tasting
  documentation: https://tea-tasting.e10v.me

extra:
  recipe-maintainers:
    - thewchan
